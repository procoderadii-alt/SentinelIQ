services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentineliq
      POSTGRES_USER: sentineliq
      POSTGRES_PASSWORD: sentineliq
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentineliq"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://sentineliq:sentineliq@postgres:5432/sentineliq
      SECRET_KEY: local-compose-secret
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://localhost,http://localhost:8080,http://127.0.0.1:8080
      SEED_CRIMES: 50000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started


  frontend:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres-data:

